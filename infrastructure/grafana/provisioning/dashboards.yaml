# Grafana dashboard provisioning - point Grafana to this file
apiVersion: 1
providers:
  - name: "MIP Dashboards"
    orgId: 1
    folder: "MIP"
    folderUid: "mip"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      # Mount dashboards/ folder to this path when running Grafana
