# Base configuration - common across all environments

data:
  data_dir: data
  sample_data_path: data/sample_trades.csv

features:
  window_seconds: 60
  min_events: 2

detection:
  anomaly_threshold: -0.5
  isolation_forest:
    n_estimators: 100
    contamination: 0.1
  online:
    threshold: 0.5
    n_trees: 10

explainability:
  shap_top_k: 3

api:
  host: "0.0.0.0"
  port: 8000

dashboard:
  port: 8501

persistence:
  db_path: data/alerts.db

stream:
  speed_multiplier: 1.0
